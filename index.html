<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Tafí York | La Voz de la Ciudad</title>
    <style>
        :root {
            --blanco: #ffffff;
            --negro: #000000;
            --rojo-rayo: #ed1c24;
        }

        body { 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            background-color: var(--negro); 
            color: var(--blanco);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        header {
            background-color: var(--blanco);
            width: 100%;
            padding: 15px 0;
            text-align: center;
            border-bottom: 4px solid var(--rojo-rayo);
        }

        header img {
            max-width: 250px;
            height: auto;
        }

        .main-banner {
            width: 100%;
            height: 60vh;
            background-image: url('para app 512x512.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .main-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
        }

        .player-card {
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--blanco);
            padding: 30px;
            text-align: center;
            width: 80%;
            max-width: 400px;
            z-index: 10;
        }

        .status-text {
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #fff;
        }

        .btn-play {
            background-color: var(--blanco);
            color: var(--negro);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
        }

        .whatsapp-section {
            padding: 40px 20px;
            text-align: center;
        }

        .btn-wsapp {
            color: var(--blanco);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 5px;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.7rem;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    <img src="para app 549x134.png" alt="Tafí York Logo">
</header>

<div class="main-banner">
    <div class="player-card">
        <div class="status-text" id="status">AIRE: TAFÍ YORK VARIOS</div>
        
        <audio id="stream" preload="none">
            <source src="http://212.84.160.3:5905/;" type="audio/mpeg">
        </audio>
        
        <button class="btn-play" id="playBtn" onclick="controlarRadio()">ESCUCHAR EN VIVO</button>
    </div>
</div>

<div class="whatsapp-section">
    <a href="https://wa.me/543814644322" class="btn-wsapp" target="_blank">
        CONTACTO WHATSAPP
    </a>
</div>

<footer>
    © 2026 TAFÍ YORK RADIO | Una producción de Box 360
</footer>

<script>
    const audio = document.getElementById('stream');
    const btn = document.getElementById('playBtn');
    const status = document.getElementById('status');

    function controlarRadio() {
        if (audio.paused) {
            // Recargamos el audio para evitar que se quede "trabado"
            audio.load();
            audio.play().then(() => {
                btn.innerHTML = "PAUSAR";
                status.innerHTML = "● EN VIVO";
                status.style.color = "#ed1c24";
            }).catch(error => {
                console.log("Error de reproducción:", error);
                alert("Para escuchar, hacé clic de nuevo. Algunos navegadores bloquean el audio automático.");
            });
        } else {
            audio.pause();
            btn.innerHTML = "ESCUCHAR EN VIVO";
            status.innerHTML = "AIRE: TAFÍ YORK VARIOS";
            status.style.color = "#fff";
        }
    }
</script>

</body>
</html>
