<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Tafí York | Noticias & Radio Online</title>
    <style>
        :root {
            --primario: #ed1c24; /* Rojo Tafí York */
            --oscuro: #0a0a0a;    /* Fondo Negro */
            --tarjeta: #161616;  /* Gris de bloques */
            --texto: #e0e0e0;
            --blanco: #ffffff;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--oscuro); 
            color: var(--texto);
            line-height: 1.6;
        }

        /* BARRA SUPERIOR */
        header {
            background: var(--blanco);
            padding: 15px;
            text-align: center;
            border-bottom: 5px solid var(--primario);
        }
        header img { max-width: 250px; height: auto; }

        /* SECCIÓN DE RADIO CENTRADA */
        .radio-section {
            background-color: #000;
            padding: 40px 10px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .radio-container {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%;
        }

        /* El recorte para que no se vea el blanco del iframe */
        .reproductor-wrap {
            background: #111; 
            padding: 0; 
            border-radius: 15px; 
            border: 2px solid #333; 
            width: 100%; 
            max-width: 400px; 
            height: 160px; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%; 
            height: 500px; 
            border: none; 
            margin-top: -165px; /* Ajuste para centrar el botón de play de Listen2MyShow */
        }

        /* GRILLA DE CONTENIDO */
        .main-grid {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* BLOQUES DE NOTICIAS */
        .card {
            background: var(--tarjeta);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--primario); }

        .card-content { padding: 25px; }
        .card-tag { 
            color: var(--primario); 
            font-size: 0.75rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            border: 1px solid var(--primario);
            padding: 2px 8px;
            border-radius: 3px;
        }
        .card h2 { margin: 15px 0 10px 0; color: var(--blanco); font-size: 1.6rem; }
        .card p { color: #aaa; font-size: 0.95rem; }

        /* SIDEBAR */
        .sidebar-title { 
            color: var(--blanco); 
            border-left: 4px solid var(--primario); 
            padding-left: 10px; 
            margin-bottom: 20px; 
            font-size: 1.1rem;
        }
        
        .whatsapp-box {
            background: linear-gradient(45deg, #25d366, #128c7e);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            color: white;
            text-decoration: none;
            display: block;
            font-weight: bold;
        }

        .publicidad {
            margin-top: 30px;
            padding: 40px 20px;
            border: 2px dashed #333;
            border-radius: 12px;
            text-align: center;
            color: #444;
        }

        /* ANIMACIÓN AIRE */
        .blink { animation: pulse 1.5s infinite; color: var(--primario); font-weight: bold; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        footer { text-align: center; padding: 60px 20px; border-top: 1px solid #222; color: #444; font-size: 0.8rem; }

        /* RESPONSIVE */
        @media (max-width: 850px) {
            .main-grid { grid-template-columns: 1fr; }
            header img { max-width: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="para app 549x134.png" alt="Tafí York">
    </header>

    <section class="radio-section">
        <div style="margin-bottom: 20px; letter-spacing: 2px; font-size: 0.9rem;">
            <span class="blink">●</span> AL AIRE: TAFÍ YORK RADIO
        </div>

                <iframe

                    scrolling="no">
                </iframe>
            </div>
        </div>
