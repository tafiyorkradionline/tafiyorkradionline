<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Tafí York | Aire Online</title>
    <style>
        :root { --rojo: #ed1c24; --negro: #000000; --blanco: #ffffff; }
        body { margin: 0; background: var(--negro); color: var(--blanco); font-family: Arial, sans-serif; text-align: center; }
        header { background: var(--blanco); padding: 15px; border-bottom: 4px solid var(--rojo); }
        header img { max-width: 250px; }
        .banner { 
            height: 60vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('para app 512x512.jpg');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
        }
        .player { border: 2px solid var(--blanco); padding: 30px; background: rgba(0,0,0,0.8); width: 80%; max-width: 350px; }
        .btn { 
            background: var(--blanco); color: var(--negro); border: none; 
            padding: 15px 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%;
        }
        .envivo { color: var(--rojo); font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<header><img src="para app 549x134.png" alt="Logo"></header>

<div class="banner">
    <div class="player">
        <div id="aire" class="envivo">● EN VIVO</div>
        <div style="margin-bottom:20px;">TAFÍ YORK VARIOS</div>
        
        <audio id="radio" controls style="width: 100%; filter: invert(1);">
            <source src="http://212.84.160.3:5905/;" type="audio/mpeg">
            Tu navegador no soporta el audio.
        </audio>
        
        <p style="font-size: 0.8rem; margin-top: 15px;">Si no escuchás, dale Play al reproductor de arriba</p>
    </div>
</div>

<footer>
    <p>© 2026 Tafí York | Box 360</p>
</footer>

</body>
</html>
